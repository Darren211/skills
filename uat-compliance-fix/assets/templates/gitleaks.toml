title = "Exchange Platform Gitleaks Config"

[allowlist]
  description = "Allowed patterns"
  paths = [
    '''\.env\.example$''',
    '''private\.toml\.example$''',
    '''config\.example\.toml$''',
  ]

[[rules]]
  id = "database-dsn"
  description = "Database connection string with password"
  regex = '''(?i)(dsn|database_url|db_url)\s*=\s*["']?\w+:\w+@'''
  tags = ["database", "credential"]

[[rules]]
  id = "private-ip"
  description = "Private IP address"
  regex = '''(?:10|172\.(?:1[6-9]|2\d|3[01])|192\.168)\.\d{1,3}\.\d{1,3}'''
  tags = ["infrastructure"]

[[rules]]
  id = "api-token"
  description = "API Token/Key"
  regex = '''(?i)(api[_-]?key|api[_-]?token|access[_-]?token)\s*[:=]\s*["']?[a-zA-Z0-9_\-]{20,}'''
  tags = ["token"]

[[rules]]
  id = "private-key-content"
  description = "Private key content in file"
  regex = '''-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----'''
  tags = ["key"]

[[rules]]
  id = "password-assignment"
  description = "Password assignment in config"
  regex = '''(?i)(password|passwd|pwd)\s*[=:]\s*["']?[^\s"']{8,}'''
  tags = ["credential"]
